<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rede de Contatos — Grafo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 1.5rem 2rem 1rem;
    border-bottom: 1px solid #1e2433;
  }
  header h1 { font-size: 1.4rem; font-weight: 600; color: #93c5fd; }
  header p  { font-size: 0.85rem; color: #64748b; margin-top: 4px; }
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  #canvas-wrap {
    flex: 1;
    position: relative;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
  .sidebar {
    width: 280px;
    background: #131722;
    border-left: 1px solid #1e2433;
    padding: 1.2rem;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
  }
  .sidebar h3 {
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #475569;
    margin-bottom: .5rem;
  }
  .adjacencia-item {
    font-size: 0.82rem;
    padding: 6px 0;
    border-bottom: 1px solid #1e2433;
    line-height: 1.5;
  }
  .adjacencia-item strong { color: #93c5fd; }
  .adjacencia-item span   { color: #64748b; }
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .stat-card {
    background: #1a2035;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 0.82rem;
  }
  .stat-card .val { font-size: 1.5rem; font-weight: 700; color: #93c5fd; }
  .stat-card .lbl { color: #64748b; font-size: 0.73rem; margin-top: 2px; }
  .bfs-result {
    font-size: 0.82rem;
  }
  .bfs-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 1px solid #1e2433;
  }
  .bfs-row .nome { width: 90px; color: #e2e8f0; }
  .bfs-row .dots span {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 2px;
  }
  .dot-filled  { background: #93c5fd; }
  .dot-empty   { background: #1e2433; }
  .bfs-row .dist { color: #64748b; font-size: 0.75rem; margin-left: auto; }
  .hint {
    font-size: 0.75rem;
    color: #334155;
    text-align: center;
    padding: .5rem;
  }
  select, button {
    background: #1a2035;
    border: 1px solid #2d3748;
    color: #e2e8f0;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 0.82rem;
    cursor: pointer;
    width: 100%;
    margin-bottom: 6px;
  }
  button:hover { background: #233050; }
  .badge {
    display: inline-block;
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 999px;
    margin-left: 6px;
  }
  .badge-blue  { background: #1e3a5f; color: #93c5fd; }
  .badge-green { background: #14532d; color: #86efac; }
</style>
</head>
<body>
<header>
  <h1>Rede de Contatos <span class="badge badge-blue">Grafo Não-Direcionado</span><span class="badge badge-green">Não-Ponderado</span></h1>
  <p>Lista de Adjacência · BFS · DFS · Componentes Conexos</p>
</header>

<div class="layout">
  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div class="hint">Clique em um nó para ver as distâncias BFS</div>
  </div>

  <div class="sidebar">
    <div>
      <h3>BFS — Origem: <span id="bfs-origem">Clique num nó</span></h3>
      <div id="bfs-resultado" class="bfs-result"></div>
    </div>

    <div>
      <h3>Estatísticas</h3>
      <div class="stat-grid" id="stats"></div>
    </div>

    <div>
      <h3>Lista de Adjacência</h3>
      <div id="adj-list"></div>
    </div>
  </div>
</div>

<script>
// ── Dados do grafo ────────────────────────────────────────────────────
const pessoas = ["Alexandre","Emerson","Marcos","Patricia","Bruno","Carla","Diego"];
const arestas = [
  ["Alexandre","Emerson"],["Alexandre","Marcos"],["Alexandre","Patricia"],
  ["Emerson","Marcos"],["Emerson","Bruno"],
  ["Marcos","Carla"],["Patricia","Diego"],["Bruno","Carla"]
];

// Lista de adjacência
const adj = {};
pessoas.forEach(p => adj[p] = new Set());
arestas.forEach(([a,b]) => { adj[a].add(b); adj[b].add(a); });

// ── Layout circular + ajustes ─────────────────────────────────────────
const posBase = {};
const cx = 400, cy = 280, r = 200;
pessoas.forEach((p, i) => {
  const ang = (2 * Math.PI * i / pessoas.length) - Math.PI / 2;
  posBase[p] = { x: cx + r * Math.cos(ang), y: cy + r * Math.sin(ang) };
});

// ── Canvas setup ──────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;
const CORES = {
  normal:   '#3b82f6',
  highlight:'#fbbf24',
  muted:    '#1e3a5f',
  aresta:   '#1e3a5f',
  arestaHL: '#fbbf24',
  text:     '#e2e8f0',
  textMuted:'#64748b',
  bg:       '#0f1117',
};

function resize() {
  const wrap = document.getElementById('canvas-wrap');
  W = canvas.width  = wrap.offsetWidth;
  H = canvas.height = wrap.offsetHeight;
  draw(selectedNode);
}
window.addEventListener('resize', resize);

// ── BFS ───────────────────────────────────────────────────────────────
function bfs(origem) {
  const dist = { [origem]: 0 };
  const fila = [origem];
  while (fila.length) {
    const atual = fila.shift();
    for (const viz of adj[atual]) {
      if (!(viz in dist)) {
        dist[viz] = dist[atual] + 1;
        fila.push(viz);
      }
    }
  }
  return dist;
}

// ── Desenho ───────────────────────────────────────────────────────────
let selectedNode = null;

function posAt(nome) {
  // Escala as posições base para o canvas atual
  const scaleX = W / 800, scaleY = H / 560;
  const s = Math.min(scaleX, scaleY);
  const offX = (W - 800 * s) / 2, offY = (H - 560 * s) / 2;
  return {
    x: posBase[nome].x * s + offX,
    y: posBase[nome].y * s + offY,
  };
}

function draw(sel) {
  if (!W) return;
  ctx.fillStyle = CORES.bg;
  ctx.fillRect(0, 0, W, H);

  const distancias = sel ? bfs(sel) : null;

  // Arestas
  arestas.forEach(([a, b]) => {
    const pa = posAt(a), pb = posAt(b);
    const ativo = sel && (adj[sel].has(a) && b === sel || adj[sel].has(b) && a === sel || a === sel || b === sel);
    ctx.beginPath();
    ctx.moveTo(pa.x, pa.y);
    ctx.lineTo(pb.x, pb.y);
    ctx.strokeStyle = ativo ? CORES.arestaHL : CORES.aresta;
    ctx.lineWidth   = ativo ? 2 : 1;
    ctx.globalAlpha = ativo ? 0.85 : 0.4;
    ctx.stroke();
    ctx.globalAlpha = 1;
  });

  // Nós
  pessoas.forEach(nome => {
    const { x, y } = posAt(nome);
    const isSel   = nome === sel;
    const isAmigo = sel && adj[sel].has(nome);
    const isMuted = sel && !isSel && !isAmigo;
    const raio = isSel ? 22 : 16;

    ctx.beginPath();
    ctx.arc(x, y, raio, 0, Math.PI * 2);
    ctx.fillStyle = isSel ? CORES.highlight : isAmigo ? '#1d4ed8' : isMuted ? CORES.muted : CORES.normal;
    ctx.globalAlpha = isMuted ? 0.4 : 1;
    ctx.fill();
    ctx.strokeStyle = isSel ? '#fde68a' : '#1e3a5f';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Rótulo
    ctx.fillStyle = isMuted ? CORES.textMuted : CORES.text;
    ctx.font = `${isSel ? '500 ' : ''}${isSel ? 13 : 12}px 'Segoe UI', system-ui`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(nome.slice(0, 9), x, y + raio + 14);

    // Distância BFS
    if (distancias && nome in distancias) {
      ctx.fillStyle = '#fbbf24';
      ctx.font = '500 11px monospace';
      ctx.fillText(distancias[nome] === 0 ? '★' : distancias[nome], x, y);
    }
  });
}

// ── Clique ────────────────────────────────────────────────────────────
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  let hit = null;
  pessoas.forEach(nome => {
    const { x, y } = posAt(nome);
    if (Math.hypot(mx - x, my - y) < 22) hit = nome;
  });
  selectedNode = (hit === selectedNode) ? null : hit;
  draw(selectedNode);
  renderBFS(selectedNode);
});

// ── Sidebar: BFS ─────────────────────────────────────────────────────
function renderBFS(origem) {
  const el = document.getElementById('bfs-resultado');
  const lbl = document.getElementById('bfs-origem');
  if (!origem) {
    lbl.textContent = 'Clique num nó';
    el.innerHTML = '<div style="color:#475569;font-size:.8rem">Clique em uma pessoa no grafo.</div>';
    return;
  }
  lbl.textContent = origem;
  const dist = bfs(origem);
  const sorted = Object.entries(dist).sort((a, b) => a[1] - b[1]);
  el.innerHTML = sorted.map(([nome, d]) => {
    const dots = Array.from({length: 4}, (_, i) =>
      `<span class="${i < d ? 'dot-filled' : 'dot-empty'}"></span>`).join('');
    return `<div class="bfs-row">
      <span class="nome">${nome}</span>
      <span class="dots">${dots}</span>
      <span class="dist">${d === 0 ? 'origem' : d + ' salto(s)'}</span>
    </div>`;
  }).join('');
}

// ── Sidebar: Adjacência ───────────────────────────────────────────────
function renderAdj() {
  const el = document.getElementById('adj-list');
  el.innerHTML = pessoas.sort().map(p => {
    const amigos = [...adj[p]].sort().join(', ');
    return `<div class="adjacencia-item">
      <strong>${p}</strong><br>
      <span>→ ${amigos || '(sem amigos)'}</span>
    </div>`;
  }).join('');
}

// ── Sidebar: Estatísticas ─────────────────────────────────────────────
function renderStats() {
  const nArestas = arestas.length;
  const graus = pessoas.map(p => adj[p].size);
  const maxGrau = Math.max(...graus);
  const popular = pessoas[graus.indexOf(maxGrau)];

  // Componentes conexos via DFS
  const visitados = new Set();
  let nComp = 0;
  pessoas.forEach(p => {
    if (!visitados.has(p)) {
      nComp++;
      const pilha = [p];
      while (pilha.length) {
        const atual = pilha.pop();
        if (visitados.has(atual)) continue;
        visitados.add(atual);
        adj[atual].forEach(v => { if (!visitados.has(v)) pilha.push(v); });
      }
    }
  });

  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="val">${pessoas.length}</div><div class="lbl">Pessoas</div></div>
    <div class="stat-card"><div class="val">${nArestas}</div><div class="lbl">Amizades</div></div>
    <div class="stat-card"><div class="val">${nComp}</div><div class="lbl">Componentes</div></div>
    <div class="stat-card"><div class="val">${maxGrau}</div><div class="lbl">Grau máx.</div></div>
    <div class="stat-card" style="grid-column:span 2">
      <div class="lbl">Mais popular</div>
      <div style="color:#fbbf24;font-weight:600;margin-top:4px">${popular} (${maxGrau} amigos)</div>
    </div>
  `;
}

// ── Init ──────────────────────────────────────────────────────────────
renderAdj();
renderStats();
renderBFS(null);
resize();
</script>
</body>
</html>
